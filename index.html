<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 桌面版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f7fa;
            --bg-card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* 主题切换 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            fill: var(--text);
        }

        /* 主容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* 页面切换 */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 欢迎页 */
        .welcome-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: var(--shadow-lg);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
        }

        /* 功能卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .feature:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .feature-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .feature h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .feature p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(99, 102, 241, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        /* 状态卡片 */
        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .status-title {
            font-size: 16px;
            font-weight: 600;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.installing {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-badge.completed {
            background: #d1fae5;
            color: #065f46;
        }

        [data-theme="dark"] .status-badge.pending {
            background: #451a03;
            color: #fcd34d;
        }

        [data-theme="dark"] .status-badge.installing {
            background: #1e3a8a;
            color: #93c5fd;
        }

        [data-theme="dark"] .status-badge.completed {
            background: #064e3b;
            color: #6ee7b7;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-dot.pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 进度条 */
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 3px;
            transition: width 0.5s ease;
            width: 0%;
        }

        /* 终端 */
        .terminal {
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }

        .terminal-header {
            background: #1e293b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-dot.red { background: #ff5f56; }
        .terminal-dot.yellow { background: #ffbd2e; }
        .terminal-dot.green { background: #27c93f; }

        .terminal-body {
            padding: 16px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e2e8f0;
            height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* 主界面 */
        .main-interface {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .main-header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .main-title {
            font-size: 18px;
            font-weight: 600;
        }

        .main-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .main-actions {
            padding: 20px 24px;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .webview-container {
            height: 500px;
            background: var(--bg);
        }

        webview {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .features {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .main-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="切换主题">
        <svg id="sunIcon" viewBox="0 0 24 24"><path d="M12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-13.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5.67-1.5 1.5-1.5zm0 17c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm-8.5-8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5zm17 0c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5.67-1.5 1.5-1.5 1.5.67 1.5 1.5z"/></svg>
        <svg id="moonIcon" class="hidden" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>

    <div class="container">
        <!-- 欢迎页 -->
        <div id="welcomePage" class="page active">
            <div class="welcome-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <h1>OpenClaw 桌面版</h1>
                <p class="subtitle">便携式 AI 助手，零配置，开箱即用</p>
            </div>

            <div class="features">
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    </div>
                    <h3>零依赖运行</h3>
                    <p>无需预装 Node.js，自动配置运行环境，完全隔离</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                    </div>
                    <h3>智能对话</h3>
                    <p>基于 OpenClaw 强大的 AI 能力，支持多种任务</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                    </div>
                    <h3>安全可靠</h3>
                    <p>所有数据存储在本地沙箱，保护隐私安全</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><path d="M13 7h-2v4H7v2h4v4h2v-4h4v-2h-4V7zm-1-5C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                    </div>
                    <h3>一键启动</h3>
                    <p>简洁直观的界面，自动完成环境配置</p>
                </div>
            </div>

            <div style="text-align: center;">
                <button class="btn btn-primary" id="startBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <span id="startBtnText">开始使用</span>
                </button>
            </div>
        </div>

        <!-- 安装页 -->
        <div id="installPage" class="page">
            <div class="welcome-header" style="margin-bottom: 30px;">
                <h1>环境配置</h1>
                <p class="subtitle">首次使用需要配置运行环境</p>
            </div>

            <div class="status-card">
                <div class="status-header">
                    <span class="status-title">Node.js 运行环境</span>
                    <span class="status-badge pending" id="nodejsStatus">
                        <span class="status-dot"></span>
                        等待安装
                    </span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="nodejsProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="status-card">
                <div class="status-header">
                    <span class="status-title">OpenClaw 核心组件</span>
                    <span class="status-badge pending" id="openclawStatus">
                        <span class="status-dot"></span>
                        等待安装
                    </span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="openclawProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="terminal">
                <div class="terminal-header">
                    <span class="terminal-dot red"></span>
                    <span class="terminal-dot yellow"></span>
                    <span class="terminal-dot green"></span>
                    <span style="color: #94a3b8; margin-left: 8px; font-size: 13px;">安装日志</span>
                </div>
                <div class="terminal-body" id="terminal">准备开始安装...</div>
            </div>

            <div style="text-align: center; margin-top: 24px;">
                <button class="btn btn-primary hidden" id="enterBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
                    进入应用
                </button>
            </div>
        </div>

        <!-- 主界面 -->
        <div id="mainPage" class="page">
            <div class="main-interface">
                <div class="main-header">
                    <span class="main-title">OpenClaw 控制台</span>
                    <span class="main-status">
                        <span id="serverStatusDot" style="width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5);"></span>
                        <span id="serverStatusText">已停止</span>
                    </span>
                </div>

                <div class="main-actions">
                    <button class="btn btn-primary" id="launchBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        启动服务
                    </button>
                    <button class="btn btn-danger hidden" id="shutdownBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
                        停止服务
                    </button>
                    <button class="btn btn-secondary" id="settingsBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L5.09 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                        重新配置
                    </button>
                </div>

                <div class="webview-container">
                    <webview id="webview" src="" allowpopups nodeintegration></webview>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // 状态
        let currentPage = 'welcome';
        let isInstalled = false;
        let serverRunning = false;

        // DOM 元素
        const welcomePage = document.getElementById('welcomePage');
        const installPage = document.getElementById('installPage');
        const mainPage = document.getElementById('mainPage');
        const terminal = document.getElementById('terminal');

        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        let currentTheme = localStorage.getItem('theme') || 'light';

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        }

        applyTheme(currentTheme);

        themeToggle.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(currentTheme);
            localStorage.setItem('theme', currentTheme);
        });

        // 页面切换
        function showPage(page) {
            welcomePage.classList.remove('active');
            installPage.classList.remove('active');
            mainPage.classList.remove('active');

            if (page === 'welcome') welcomePage.classList.add('active');
            if (page === 'install') installPage.classList.add('active');
            if (page === 'main') mainPage.classList.add('active');

            currentPage = page;
        }

        // 添加日志
        function addLog(message) {
            terminal.textContent += message;
            terminal.scrollTop = terminal.scrollHeight;
        }

        // 更新安装状态
        function updateInstallStatus(step, status) {
            const statusEl = document.getElementById(step + 'Status');
            const progressEl = document.getElementById(step + 'Progress');

            if (status === 'installing') {
                statusEl.className = 'status-badge installing';
                statusEl.innerHTML = '<span class="status-dot pulse"></span>安装中';
                progressEl.style.width = '50%';
            } else if (status === 'completed') {
                statusEl.className = 'status-badge completed';
                statusEl.innerHTML = '<span class="status-dot"></span>已完成';
                progressEl.style.width = '100%';
            }
        }

        // 更新服务器状态
        function updateServerStatus(running, port = null) {
            serverRunning = running;
            const dot = document.getElementById('serverStatusDot');
            const text = document.getElementById('serverStatusText');
            const launchBtn = document.getElementById('launchBtn');
            const shutdownBtn = document.getElementById('shutdownBtn');
            const webview = document.getElementById('webview');

            if (running) {
                dot.style.background = '#4ade80';
                dot.style.boxShadow = '0 0 8px #4ade80';
                text.textContent = port ? `运行中 (端口 ${port})` : '运行中';
                launchBtn.classList.add('hidden');
                shutdownBtn.classList.remove('hidden');
                if (port) {
                    const url = `http://127.0.0.1:${port}/`;
                    console.log('加载 WebView:', url);
                    webview.src = url;
                    
                    // 监听 webview 加载事件
                    webview.addEventListener('did-start-loading', () => {
                        console.log('WebView 开始加载');
                    });
                    
                    webview.addEventListener('did-finish-load', () => {
                        console.log('WebView 加载完成');
                    });
                    
                    webview.addEventListener('did-fail-load', (event) => {
                        console.error('WebView 加载失败:', event);
                    });
                }
            } else {
                dot.style.background = 'rgba(255,255,255,0.5)';
                dot.style.boxShadow = 'none';
                text.textContent = '已停止';
                launchBtn.classList.remove('hidden');
                shutdownBtn.classList.add('hidden');
                webview.src = '';
            }
        }

        // 事件监听
        document.getElementById('startBtn').addEventListener('click', async () => {
            if (isInstalled) {
                showPage('main');
            } else {
                showPage('install');
                try {
                    const result = await ipcRenderer.invoke('install-environment');
                    if (result.success) {
                        document.getElementById('enterBtn').classList.remove('hidden');
                        isInstalled = true;
                    } else {
                        addLog('\n[错误] ' + result.error + '\n');
                    }
                } catch (error) {
                    addLog('\n[错误] ' + error.message + '\n');
                }
            }
        });

        document.getElementById('enterBtn').addEventListener('click', () => {
            showPage('main');
        });

        document.getElementById('launchBtn').addEventListener('click', async () => {
            try {
                const result = await ipcRenderer.invoke('start-server');
                if (!result.success) {
                    alert(result.error);
                }
            } catch (error) {
                alert('启动失败: ' + error.message);
            }
        });

        document.getElementById('shutdownBtn').addEventListener('click', async () => {
            try {
                await ipcRenderer.invoke('stop-server');
            } catch (error) {
                console.error('停止失败:', error);
            }
        });

        document.getElementById('settingsBtn').addEventListener('click', () => {
            showPage('install');
        });

        // IPC 事件
        ipcRenderer.on('check-status', (event, status) => {
            isInstalled = status.fullyInstalled;
            const btnText = document.getElementById('startBtnText');
            
            if (isInstalled) {
                btnText.textContent = '进入应用';
            } else {
                btnText.textContent = '开始使用';
            }
        });

        ipcRenderer.on('install-status', (event, data) => {
            updateInstallStatus(data.step, data.status);
        });

        ipcRenderer.on('install-log', (event, data) => {
            addLog(data);
        });

        ipcRenderer.on('install-error', (event, data) => {
            addLog('[错误] ' + data);
        });

        ipcRenderer.on('server-ready', (event, data) => {
            updateServerStatus(true, data.port);
            addLog(`\n[服务] OpenClaw 已启动，端口: ${data.port}\n`);
        });

        ipcRenderer.on('server-stopped', () => {
            updateServerStatus(false);
            addLog('\n[服务] OpenClaw 已停止\n');
        });

        ipcRenderer.on('server-log', (event, data) => {
            addLog(data);
        });

        ipcRenderer.on('server-error', (event, data) => {
            addLog('[错误] ' + data);
        });
    </script>
</body>
</html>
